spring.application.name=security-microservice

# DataBase
spring.profiles.active=env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Spring Security Oauth API's
spring.security.oauth2.client.registration.google.client-id=${OAUTH_NAME}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_Secret}
spring.security.oauth2.client.registration.google.scope=email,profile

### microservices setup ###
server.port=${server_port}
eureka.client.service-url.defaultZone=${eureka_server_url}


# JWT Configuration
jwt.secret=${jwt_s_key}
jwt.access-token-expiration=${access_token_expirey}
jwt.refresh-token-expiration=${refresh_token_expirey}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${email_id}
spring.mail.password=${email_password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


### log's ###
##################################################
# Logging Configuration
##################################################

logging.file.name=logs/security-microservice.log

logging.level.root=INFO

logging.level.com.security.microservice=DEBUG